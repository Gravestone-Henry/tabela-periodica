    <style>
        /* Estilo Dark - Dark Henry's Edition */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a; /* Azul marinho muito escuro */
            color: #f1f5f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
            margin: 0;
        }

        h1 { 
            color: #38bdf8; 
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        p { margin-bottom: 30px; color: #94a3b8; }

        /* Grade da Tabela incrivelmente sofri p fazer isso */
        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, 65px);
            grid-template-rows: repeat(10, 80px); 
            gap: 8px;
            background: #1e293b; 
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        /* Estilo dos Elementos */
        .element {
            background-color: #0f172a;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 6px;
            position: relative;
            color: #fff;
        }

        /* Efeito Glow no Hover */
        .element:hover {
            transform: translateY(-5px) scale(1.05);
            z-index: 10;
            box-shadow: 0 0 15px currentColor;
            filter: brightness(1.2);
            border-color: #fff;
        }

        .atomic-number { font-size: 0.7rem; position: absolute; top: 4px; left: 6px; opacity: 0.8; }
        .symbol { font-weight: bold; font-size: 1.3rem; margin-bottom: 2px; }
        .name { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; }
        
        /* Novo: Estilo para a Massa Atômica pq eu acho mt foda */
        .atomic-mass { font-size: 0.5rem; position: absolute; bottom: 4px; right: 6px; opacity: 0.6; }

        /* Cores Dark Mode (Cores Neon Vibrantes) */
        .non-metal { color: #4ade80; border-left: 4px solid #4ade80; }
        .noble-gas { color: #c084fc; border-left: 4px solid #c084fc; }
        .alkali-metal { color: #fb7185; border-left: 4px solid #fb7185; }
        .alkaline-earth { color: #fbbf24; border-left: 4px solid #fbbf24; }
        .metalloid { color: #2dd4bf; border-left: 4px solid #2dd4bf; }
        .transition { color: #60a5fa; border-left: 4px solid #60a5fa; }
        .post-transition { color: #a3e635; border-left: 4px solid #a3e635; }
        .lanthanide { color: #f472b6; border-left: 4px solid #f472b6; }
        .actinide { color: #fb923c; border-left: 4px solid #fb923c; }
        
        /* Info Box Moderna */
        #info-box {
            margin-top: 30px;
            padding: 20px;
            background: #1e293b;
            border-radius: 12px;
            min-width: 450px;
            text-align: center;
            border: 1px solid #334155;
            color: #e2e8f0;
            font-size: 1.1rem;
            transition: border-color 0.3s ease;
        }
        #info-box strong { color: #38bdf8; }
    </style>
